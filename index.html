<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORE_OS | Atlas Style</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="auth-container">
        <div class="auth-box">
            <h2 style="color:#007cff; margin-bottom:10px;">CORE_OS</h2>
            <p style="font-size:0.7rem; color:gray; margin-bottom:20px;">SYSTEM AUTHENTICATION</p>
            <input type="text" id="userEmail" placeholder="Correo">
            <input type="password" id="userPass" placeholder="Código">
            <button class="btn-main" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <nav class="navbar">
        <div class="user-profile" onclick="logout()">
            <div class="avatar">M</div>
            <span>Salir</span>
        </div>
        <div class="nav-links">
            <button onclick="showSection('chat')">IA</button>
            <button onclick="showSection('visual')">Visual</button>
            <button onclick="showSection('comms')">Feedback</button>
        </div>
    </nav>

    <main class="main-content">
        <section id="chat-sec" class="app-section active">
            <div id="chat-window" class="chat-container">
                </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Escribir..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">></button>
            </div>
        </section>

        <section id="visual-sec" class="app-section">
            <div id="galeria-grid" class="photo-grid"></div>
        </section>

        <section id="comms-sec" class="app-section">
            <div class="card">
                <h3>Reporte Directo</h3>
                <form action="https://formspree.io/f/mariotigrero07@gmail.com" method="POST">
                    <textarea name="message" placeholder="Tus comentarios aquí..."></textarea>
                    <button type="submit" class="btn-main">ENVIAR A BANDEJA</button>
                </form>
            </div>
        </section>
    </main>

    <script src="js/ia.js"></script>
    <script src="js/galeria.js"></script>
</body>
</html>
